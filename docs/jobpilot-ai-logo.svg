<svg width="420" height="500" viewBox="0 0 420 500" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">JobPilot AI icon</title>
  <desc id="desc">A teal magnifying glass with a candidate profile inside and a sparkle, used as the JobPilot AI brand icon.</desc>
  <defs>
    <linearGradient id="teal" x1="112" y1="112" x2="327" y2="365" gradientUnits="userSpaceOnUse">
      <stop stop-color="#16D2A5"/>
      <stop offset="1" stop-color="#008D83"/>
    </linearGradient>
    <linearGradient id="tile" x1="80" y1="54" x2="340" y2="440" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="0.62" stop-color="#FBFFFF"/>
      <stop offset="1" stop-color="#DFFBF5"/>
    </linearGradient>
    <filter id="softShadow" x="30" y="30" width="360" height="420" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#009E8D" flood-opacity="0.18"/>
    </filter>
    <filter id="iconShadow" x="60" y="92" width="300" height="305" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#008C83" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect x="52" y="42" width="316" height="386" rx="78" fill="url(#tile)" filter="url(#softShadow)"/>

  <g filter="url(#iconShadow)">
    <circle cx="184" cy="218" r="111" stroke="url(#teal)" stroke-width="45"/>
    <path d="M269 302L328 361" stroke="url(#teal)" stroke-width="46" stroke-linecap="round"/>
    <circle cx="184" cy="190" r="30" fill="url(#teal)"/>
    <path d="M130 272C139 238 160 224 184 224C208 224 229 238 238 272C239 276 237 281 233 284C220 294 203 300 184 300C165 300 148 294 135 284C131 281 129 276 130 272Z" fill="url(#teal)"/>
  </g>

  <path d="M296 100C303 128 318 143 346 150C318 157 303 172 296 200C289 172 274 157 246 150C274 143 289 128 296 100Z" fill="url(#teal)"/>

  <text x="210" y="470" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="48" font-weight="800" fill="#102A4C">JobPilot AI</text>
</svg>
