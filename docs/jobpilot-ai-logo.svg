<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">JobPilot AI icon</title>
  <desc id="desc">A friendly navy robot head with blue side panels, an antenna, a smile, and a blue tie.</desc>
  <defs>
    <linearGradient id="tile" x1="34" y1="28" x2="492" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#030d1f"/>
      <stop offset="1" stop-color="#081937"/>
    </linearGradient>
    <linearGradient id="head" x1="124" y1="90" x2="388" y2="338" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#143060"/>
      <stop offset="1" stop-color="#071836"/>
    </linearGradient>
    <linearGradient id="blue" x1="80" y1="40" x2="350" y2="504" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0068ff"/>
      <stop offset="1" stop-color="#224eff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="13" flood-color="#0a1e3a" flood-opacity=".16"/>
    </filter>
  </defs>

  <rect x="10" y="10" width="492" height="492" rx="92" fill="url(#tile)"/>

  <g filter="url(#shadow)">
    <rect x="241" y="46" width="30" height="82" rx="15" fill="#0b2349"/>
    <circle cx="256" cy="42" r="34" fill="url(#head)"/>

    <rect x="46" y="174" width="54" height="106" rx="27" fill="url(#blue)"/>
    <rect x="412" y="174" width="54" height="106" rx="27" fill="url(#blue)"/>

    <rect x="96" y="116" width="320" height="228" rx="62" fill="url(#head)"/>

    <path d="M164 215c7-29 64-29 72 0" fill="none" stroke="#ffffff" stroke-width="19" stroke-linecap="round"/>
    <path d="M276 215c7-29 64-29 72 0" fill="none" stroke="#ffffff" stroke-width="19" stroke-linecap="round"/>
    <path d="M210 269c26 42 92 42 118 0" fill="none" stroke="#ffffff" stroke-width="18" stroke-linecap="round"/>

    <path d="M224 360h64l-22 48h-20z" fill="url(#blue)"/>
    <path d="M246 407h20l28 82-38 35-38-35z" fill="url(#blue)"/>
  </g>
</svg>
